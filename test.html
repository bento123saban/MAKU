<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input Inventaris Barang Masuk</title>
    <link rel="stylesheet" href="style.css">
    
    <style>
        :root {
    --primary: #2e7d32;
    --border: #ddd;
}

.transaction-header {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 15px;
    background: #e8f5e9;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
}

.item-card {
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 15px;
    margin-bottom: 20px;
    background: #fff;
}

.item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #eee;
    padding-bottom: 10px;
    margin-bottom: 15px;
}

.conditions-container {
    margin-left: 20px; /* Indentasi agar terlihat hirarkinya */
    border-left: 3px solid #66bb6a;
    padding-left: 15px;
}

.condition-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
    align-items: center;
}

.condition-row input, .condition-row select {
    padding: 5px;
    font-size: 0.85rem;
}

.btn-add-item {
    width: 100%;
    padding: 12px;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.btn-add-condition {
    margin-top: 10px;
    background: #eee;
    border: 1px solid #ccc;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    font-size: 0.8rem;
}

.btn-remove-item { background: #ff5252; color: white; border: none; padding: 5px 10px; border-radius: 4px; }
    </style>


</head>
<body>

<div class="container">
    <h2>Input Transaksi Barang Masuk</h2>
    
    <form id="mainForm">
        <div class="transaction-header">
            <div class="form-group">
                <label>Nomor Referensi/Nota</label>
                <input type="text" id="ref_no" placeholder="Contoh: SRJ-2026-001" required>
            </div>
            <div class="form-group">
                <label>Vendor / Pengirim</label>
                <input type="text" id="vendor" required>
            </div>
        </div>

        <div id="items-container">
            </div>

        <button type="button" id="btn-add-item" class="btn-add-item">+ Tambah Barang Baru</button>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Proses Seluruh Transaksi</button>
        </div>
    </form>
</div>

<template id="item-template">
    <div class="item-card">
        <div class="item-header">
            <div class="field-group">
                <label>Pilih Barang</label>
                <select class="item-select" required>
                    <option value="">-- Pilih --</option>
                    <option value="sapu">Sapu Lidi</option>
                    <option value="tong">Tong Sampah</option>
                </select>
            </div>
            <button type="button" class="btn-remove-item">Hapus Barang</button>
        </div>

        <div class="conditions-container">
            </div>
        
        <button type="button" class="btn-add-condition">+ Kondisi</button>
    </div>
</template>

<script src="script.js"></script>
</body>
</html>
